<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>영혼 명부 | 사후세계 관리 사무소</title>
  <style>
    /* 전체 배경 및 폰트 설정 */
    body { 
      font-family: 'Batang', serif; 
      background: #0d0d0d; 
      color: #e0e0e0; 
      margin: 0; 
      padding: 40px 20px; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
    }
    
    .container { width: 100%; max-width: 600px; }

    /* 상단 헤더 */
    .header { 
      display: flex; 
      justify-content: space-between; 
      align-items: flex-end; 
      border-bottom: 1px solid #333; 
      padding-bottom: 15px; 
      margin-bottom: 30px; 
    }
    .header h1 { color: #c9a84c; margin: 0; font-size: 26px; letter-spacing: 2px; }
    
    /* 퇴근 버튼 */
    .logout-btn { 
      background: transparent; 
      color: #888; 
      border: 1px solid #333; 
      padding: 8px 16px; 
      border-radius: 4px;
      cursor: pointer; 
      font-family: 'Batang', serif; 
      transition: 0.3s; 
    }
    .logout-btn:hover { color: #fff; border-color: #c9a84c; }

    /* 영혼 목록 카드 디자인 */
    .soul-list { display: flex; flex-direction: column; gap: 15px; }
    .soul-card { 
      background: #1a1a1a; 
      border-radius: 6px; 
      padding: 20px; 
      position: relative;
      border-left: 5px solid #333; 
      transition: all 0.3s ease;
    }

    /* 선/악 시각적 구분 CSS */
    .soul-card.good { border-left-color: #aeeeee; }
    .soul-card.evil { border-left-color: #8B0000; box-shadow: 0 0 15px rgba(139, 0, 0, 0.15); }

    .soul-name { font-size: 18px; margin: 0 0 12px 0; display: flex; justify-content: space-between; align-items: center; }
    .soul-deed { color: #888; font-size: 14px; margin: 0; line-height: 1.5; }

    .badge { font-size: 13px; padding: 4px 10px; border-radius: 4px; letter-spacing: 1px; }
    .badge.good { background: rgba(174, 238, 238, 0.1); color: #aeeeee; }
    .badge.evil { background: rgba(139, 0, 0, 0.2); color: #ff4c4c; }
    
    .status-msg { text-align: center; color: #888; margin-top: 50px; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>영혼 명부</h1>
    <button class="logout-btn" onclick="window.location.href='/logout'">퇴근하기 (로그아웃)</button>
  </div>

  <div class="soul-list">
    {% if souls %}
      {% for soul in souls %}
        
        <div class="soul-card {% if soul.is_evil %}evil{% else %}good{% endif %}">
          <h3 class="soul-name">
            {{ soul.name }}
            <span class="badge {% if soul.is_evil %}evil{% else %}good{% endif %}">
              {% if soul.is_evil %}악(惡){% else %}선(善){% endif %}
            </span>
          </h3>
          <p class="soul-deed">이승에서의 업적: {{ soul.deed }}</p>
        </div>

      {% endfor %}
    {% else %}
      <div class="status-msg">현재 대기 중인 영혼이 없습니다.</div>
    {% endif %}
  </div>
</div>

</body>
</html>
