<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>정착 가이드 | 사후세계 관리 사무소</title>
  <style>
    body { font-family: 'Batang', serif; background: #1a1a2e; color: #e0e0e0; margin: 0; padding: 0; }
    header { background: #16213e; padding: 20px 40px; border-bottom: 2px solid #0f3460; display: flex; justify-content: space-between; align-items: center; }
    header h1 { font-size: 20px; color: #a8d8ea; margin: 0; }
    nav a { color: #a8d8ea; text-decoration: none; margin-left: 20px; font-size: 14px; }
    .container { max-width: 800px; margin: 60px auto; padding: 0 20px; }
    h2 { color: #a8d8ea; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center; }
    .write-btn { font-size: 14px; background: #0f3460; color: #a8d8ea; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; text-decoration: none; }
    .post-item { background: #16213e; border: 1px solid #0f3460; border-radius: 8px; padding: 20px; margin-bottom: 12px; cursor: pointer; transition: border-color 0.2s; }
    .post-item:hover { border-color: #a8d8ea; }
    .post-item a { text-decoration: none; color: inherit; }
    .post-title { font-size: 16px; color: #e0e0e0; margin-bottom: 6px; }
    .post-meta { font-size: 12px; color: #555; }
    .empty { text-align: center; color: #555; padding: 60px; }
    /* 글쓰기 폼 */
    .write-box { background: #16213e; border: 1px solid #0f3460; border-radius: 12px; padding: 32px; margin-bottom: 28px; }
    label { font-size: 13px; color: #aaa; display: block; margin-bottom: 6px; }
    input, textarea { width: 100%; padding: 10px; background: #1a1a2e; border: 1px solid #0f3460; border-radius: 6px; color: #e0e0e0; font-size: 14px; box-sizing: border-box; margin-bottom: 18px; }
    textarea { height: 120px; resize: vertical; }
    button { padding: 10px 24px; background: #0f3460; border: none; border-radius: 6px; color: #a8d8ea; font-size: 14px; cursor: pointer; }
  </style>
</head>
<body>
<header>
  <h1>⚖️ 사후세계 환생 관리 사무소</h1>
  <nav>
    <a href="/">홈</a>
    <a href="/queue">대기열</a>
